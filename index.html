<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class=panel>
    <div class="left-panel">
      <div class="heading" id="Day">
        <button>Today</button>
      </div>

      <div class="heading" id="Coming">
        <button>Upcoming</button>
      </div>

      <div class="heading" id="goat">
        <button>Completed</button>
      </div>
    </div>

    <div class="Right-panel">
      <div id="Now">
        <div class="title">
          <h1>Today's Focus</h1>
          
          <img src="bhoot.jpeg" id="bhoot">
        </div>

        <div class="add-Task">
          <button id="addTasks">+</button>

          <div class="input" id="input">
            <input type="text" placeholder="Enter your task here." id="taskbar"></input>
            <button id="Added">
              <img src="butto.jpeg" height="20px" width="20px">
            </button>
          </div>
        </div>
        
        <h2>No tasks for today</h2>
        <p>You have no tasks to display</p>

        <div id="output">
        </div>
      </div>

      <div id="Future">
        <h1>Upcoming goals</h1>
        <img src="bhoot.jpeg" id="bhoot">
        <button>+</button>
        <h2>No tasks for today</h2>
        <p>You have no tasks to display</p>
      </div>

      <div id="completed">
        <button>Delete</button>
        <img src="bhoot.jpeg" id="bhoot">
        <h1>Nothing Completed Yet</h1>
        <p>Finish a task to see it here! Go, You can do it!</p>
        <button>Go to Today</button>
      </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
